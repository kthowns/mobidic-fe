<!doctype html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF" />
    <link rel="icon" type="image/png" href="mobidic_icon.png" />
    <meta charset="UTF-8" />
    <title>Mobidic</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      body {
        margin: 0;
        background-color: #b3e5fc;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 250px;
      }

      .logo-image {
        width: 80px;
        height: 80px;
        margin-bottom: 30px;
        animation: float 2s ease-in-out infinite;
      }

      .progress-bg {
        width: 100%;
        height: 8px;
        background-color: rgba(255, 255, 255, 0.3);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
        margin-bottom: 10px;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background-color: #ffffff;
        border-radius: 10px;
        transition: width 0.3s ease-out;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
      }

      .loading-text {
        font-family: sans-serif;
        font-size: 14px;
        color: #01579b;
        font-weight: bold;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loader-container">
        <img
          class="logo-image"
          src="assets/assets/images/mobidic_icon.png"
          alt="MOBIDIC"
        />
        <div class="progress-bg">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div id="loading-status" class="loading-text">준비 중... 0%</div>
      </div>
    </div>

    <script>
      const fill = document.getElementById("progress-fill");
      const status = document.getElementById("loading-status");
      let isAppLoaded = false;

      function updateProgress(progress, text) {
        if (fill) fill.style.width = progress * 100 + "%";
        if (status)
          status.innerText = text + "... " + Math.round(progress * 100) + "%";
      }

      // 로딩 바 애니메이션
      let currentProgress = 0.1;
      updateProgress(currentProgress, "리소스 확인 중");
      const fakeProgress = setInterval(() => {
        if (currentProgress < 0.9) {
          currentProgress += (0.9 - currentProgress) * 0.1;
          updateProgress(currentProgress, "앱 데이터 로드 중");
        }
      }, 500);

      // Flutter 3.22+ 최신 설정 방식
      window._flutter = {
        config: {
          renderer: "html", // CanvasKit 폰트 에러 방지
          serviceWorkerSettings: {
            serviceWorkerVersion: null, // 서비스 워커 비활성화 (무한 로딩 방지)
          },
        },
      };

      // 앱이 첫 프레임을 그릴 때 로딩 화면 제거
      window.addEventListener("flutter-first-frame", function () {
        clearInterval(fakeProgress);
        updateProgress(1, "준비 완료");
        isAppLoaded = true;
        setTimeout(() => {
          const loadingDiv = document.getElementById("loading");
          if (loadingDiv) loadingDiv.remove();
        }, 200);
      });

      // 타임아웃 처리
      setTimeout(() => {
        if (!isAppLoaded) {
          status.innerHTML = `
            <div style="text-align:center;">
              로딩이 지연되고 있습니다.<br>
              <button onclick="window.location.reload(true)" style="margin-top:10px; padding:8px 15px; cursor:pointer; background:#01579b; color:white; border:none; border-radius:5px; font-weight:bold;">
                새로고침
              </button>
            </div>
          `;
        }
      }, 4000);
    </script>
    <!-- flutter_bootstrap.js가 내부적으로 _flutter.loader.load를 생성하고 호출함 -->
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>

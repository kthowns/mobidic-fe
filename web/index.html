<!doctype html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF" />
    <meta charset="UTF-8" />
    <title>mobidic_flutter</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      body {
        margin: 0;
        background-color: #b3e5fc;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 250px; /* 로딩바 너비 기준 */
      }

      .logo-image {
        width: 80px;
        height: 80px;
        margin-bottom: 30px;
        animation: float 2s ease-in-out infinite;
      }

      /* 실질적인 로딩바 배경 */
      .progress-bg {
        width: 100%;
        height: 8px;
        background-color: rgba(255, 255, 255, 0.3);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
        margin-bottom: 10px;
      }

      /* 실제로 차오르는 바 */
      .progress-fill {
        width: 0%; /* 초기값 0 */
        height: 100%;
        background-color: #ffffff;
        border-radius: 10px;
        transition: width 0.3s ease-out; /* 부드럽게 차오름 */
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
      }

      .loading-text {
        font-family: sans-serif;
        font-size: 14px;
        color: #01579b;
        font-weight: bold;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loader-container">
        <img
          class="logo-image"
          src="assets/assets/images/mobidic_icon.png"
          alt="MOBIDIC"
        />

        <div class="progress-bg">
          <div id="progress-fill" class="progress-fill"></div>
        </div>

        <div id="loading-status" class="loading-text">준비 중... 0%</div>
      </div>
    </div>
    <script>
      const fill = document.getElementById("progress-fill");
      const status = document.getElementById("loading-status");

      function updateProgress(progress, text) {
        if (fill) fill.style.width = progress * 100 + "%";
        if (status)
          status.innerText = text + "... " + Math.round(progress * 100) + "%";
      }

      window.addEventListener("load", function () {
        // 1. 리소스 로드 시작 (초기 가속)
        let currentProgress = 0.1;
        updateProgress(currentProgress, "서버 응답 확인 중");

        // 가짜 진행률: 실제 로딩 중간에 멈춰 보이지 않게 조금씩 올림
        const fakeProgress = setInterval(() => {
          if (currentProgress < 0.5) {
            currentProgress += 0.05;
            updateProgress(currentProgress, "리소스 다운로드 중");
          } else {
            clearInterval(fakeProgress);
          }
        }, 500);

        _flutter.loader.load({
          serviceWorker: {
            serviceWorkerVersion: "$SERVICE_WORKER_VERSION",
          },
          onEntrypointLoaded: async function (engineInitializer) {
            clearInterval(fakeProgress); // 엔진 로드되면 가짜 진행률 정지
            updateProgress(0.7, "엔진 초기화 중");

            const appRunner = await engineInitializer.initializeEngine();
            updateProgress(0.9, "UI 렌더링 준비");

            await appRunner.runApp();
            // 앱 실행 시점에 100% (보통 앱이 뜨면서 로딩창이 사라짐)
          },
        });
      });
    </script>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
